# -- SimulatedUser configuration --

[simulated_user]
research_brief = '''
# Research Brief: phagecounting

## Background
The dataset consists of high-throughput microplate-reader OD595 time courses from *E. coli*–phage infection experiments, plus companion Excel and MAT files for infection/detection plate workflows and MOI–growth response-surface analyses. Locally available raw inputs include the `TECAN_*.csv` plate exports, `20220901_*` and `20221022_*` Excel files for lysogeny assays, and `d20230216_*` MAT files for processed MOI-response-surface runs. The computational objective is to infer phage abundance, lytic infection parameters, lysogenization frequency, and spontaneous induction rate directly from OD dynamics while explicitly accounting for host growth state.


## Experimental Design
For the lambda_ts calibration and unknown-sample plate in `TECAN_240128.csv` (`02_Fig2bcd_step1_lambda_TS.ipynb`), I set up a lambda_ts calibration at 38 C in LBM with duplicate dilution standards spanning `no dilu` (A1–A2), `1e1 dilu` (A3–A4), `1e2 dilu` (A5–A6), `1e3 dilu` (A7–A8), `1e4 dilu` (B1–B2), `1e5 dilu` (B3–B4), `1e6 dilu` (B5–B6), and `1e7 dilu` (B7–B8). On the same plate, I included unknown samples `sample A (splA)` at C1–C2, `sample B (splB)` at C3–C4, and `sample C (splC)` at C5–C6, with `uninf` controls at C7–C8 and `LBM blank` controls at F7–F8.

For the single-phage screen in LBMM using `TECAN_230328a.csv` and `TECAN_230328b.csv` (`03_Fig2e_single_phage.ipynb`), I assigned all wells A1–D8 to the `+Phage` condition and wells E3–E8 plus F1–F4 to the `-Phage` condition. I also included `positive control` wells at E1–E2 and `LBMM blank` wells at F6–F8; note that F5 was plotted alongside the blank wells but was not included in the blank mean.

For the initial phage concentration series on `TECAN_230119.csv` with associated time-course files `df_1e0.csv` through `df_1e9.csv` (`06_Figs3df_and_Sfig8e_comparing_models.ipynb`, `Fig3ce_r_model.ipynb`, `Fig3df_comparing_models.ipynb`), I used a full plate map covering initial phage concentrations from `1e1 PFU/mL` to `1e10 PFU/mL`. Specifically, `1e10` was in A1–A2 and B1–B2, `1e9` in A3–A4 and B3–B4, `1e8` in A5–A6 and B5–B6, `1e7` in A7–A8 and B7–B8, `1e6` in C1–C2 and D1–D2, `1e5` in C3–C4 and D3–D4, `1e4` in C5–C6 and D5–D6, `1e3` in C7–C8 and D7–D8, `1e2` in E1–E2 and F1–F2, and `1e1` in E3–E4 and F3–F4.

From that same `TECAN_230119.csv` concentration series, I paired representative single wells to the phage time-course datasets `df_1e0.csv` through `df_1e9.csv`: A1 (`1e10 PFU/mL`), A3 (`1e9`), A5 (`1e8`), A7 (`1e7`), C1 (`1e6`), C3 (`1e5`), C5 (`1e4`), C7 (`1e3`), E1 (`1e2`), and E3 (`1e1`). This gave me one defined well per concentration across the `1e1–1e10 PFU/mL` range.

On `TECAN_230119.csv`, I also included uninfected and background controls used across the growth and infection experiments. The `uninfected growth control` wells were E5, E6, F5, and F6, and the `background subtraction wells` were E8 and F8.

For the no-dilution time-label map on `TECAN_230119.csv`, I used `0-` control wells F3–F4 and then assigned time labels `1 h` to A1–A2, `2 h` to A3–A4, `3 h` to A5–A6, `4 h` to A7–A8, `5 h` to B1–B2, `6 h` to B3–B4, `7 h` to B5–B6, and `8 h` to B7–B8. I also retained the code-defined `D2` label for wells C1–C2 exactly as written.

For the `1e1`-dilution time-label map on `TECAN_230119.csv`, I again used `0-` control wells F3–F4 and assigned `1 h` to D1–D2, `2 h` to D3–D4, `3 h` to D5–D6, `4 h` to D7–D8, `5 h` to E1–E2, `6 h` to E3–E4, `7 h` to E5–E6, and `8 h` to E7–E8. As in the code, I kept the `D2` label for wells F1–F2.

For the LBGM lysogenization calibration/control plate in `TECAN_230214.csv` and `TECAN_230212.csv` (`Fig5f_lysogenization.ipynb`), I prepared an initial OD600 series in paired replicate sets ranging from `0.01` to `1.02`: `0.01` at A1/B1 and A2/B2, `0.02` at A3/B3 and A4/B4, `0.04` at A5/B5 and A6/B6, `0.08` at A7/B7 and A8/B8, `0.25` at C1/D1 and C2/D2, `0.31` at C3/D3 and C4/D4, `0.50` at C5/D5 and C6/D6, and `1.02` at C7/D7 and C8/D8. I also included control wells `inoculated` at E1/F1, `MG inoculated` at E2/F2, `MG D2-a` at E3/F3, `MG D2-b` at E4/F4, and `background subtraction wells` at E7/F7; the same notebook later models wells C8/D8 from `TECAN_230212.csv`.
## Research Goals
1. Parse and annotate the raw plate-reader datasets, reconstruct time axes, identify blank and control wells, and map each local file to the appropriate assay class.
2. Rebuild the OD-based phage-counting calibration pipeline and implement matched-condition inference for unknown phage samples.
3. Reproduce the low-input single-phage detection analysis using OD trajectories, Poisson statistics, and an exact binomial test.
4. Parameterize host growth for each medium, including nutrient-dependent growth phases and OD-to-cell-density conversion.
5. Fit mechanistic ODE models of lytic infection to multi-MOI OD trajectories, compare model structures, and estimate parameter ensembles.
6. Use the fitted lytic models to predict phage time courses, derive the composite viral-growth parameter, and optionally extend the model to recovery via resistance/debris.
7. Quantify lysogen abundance from antibiotic-selection growth curves and infer the single-cell probability of lysogenization as a function of MOI.
8. Extend the lysogenization analysis across host growth rates and construct the MOI-by-growth-rate response surface.
9. Fit the spontaneous-induction model for lysogens using joint OD and phage-count time courses.

## Methodological Preferences
- Treat each `TECAN_*.csv` as a separate plate-reader run; parse the `Time [s]` row as the time axis and use the remaining labeled rows as metadata plus well-level OD traces.
- Perform plate-specific blank subtraction using medium-only wells before any peak calling or model fitting.
- Use the first local maximum after infection as the lysis OD.
- For complex media calibration curves, fit \(y = kx + b\), where \(y\) is lysis OD and \(x=\log_{10}(\mathrm{PFU}/\mathrm{mL})\).
- For minimal media calibration curves, fit \(\log_{10} y = kx + b\).
- Quantify unknown samples only against a calibration generated under the same host strain, phage strain, temperature, and medium.
- Also implement the adjacent-point interpolation variant for phage quantification, using the two calibration points bracketing the unknown lysis OD.
- Use exact Poisson and binomial calculations for the low-input assay; do not replace them with Gaussian approximations.
- Classify a well as lysed in the single-phage assay if \(\Delta OD\) between the first local maximum and the subsequent minimum is at least 0.3.
- Model uninfected host growth with sequential Monod kinetics; scan the number of nutrient phases \(X \in \{1,2,3\}\).
- Use \(X=1\) for minimal media unless the data clearly require otherwise; use \(X=3\) for LB-based media.
- In minimal media, use a constant absorptivity conversion \(\varepsilon_0 = 10^{-9}\ \mathrm{CFU}^{-1}\,\mathrm{mL}\).
- In LB-based media, model \(\varepsilon(N)\) from published growth/size data combined with the inferred nutrient trajectory, then approximate \(\varepsilon(N)\) with the same polynomial form used in the deposited scripts.
- Solve ODE systems with a standard numerical integrator such as `scipy.integrate.solve_ivp`.
- Use simulated annealing for mechanistic parameter optimization; use `emcee` for posterior/ensemble sampling.
- For lytic infection fitting, compare the null model to three growth-dependent alternatives: \(r\)-model, \(B\)-model, and \(\tau\)-model.
- Use \(M=5\) infected intermediate states in the Erlang latent-period approximation.
- For LBM lytic-model fitting, restrict the fitted OD time points to those with centered finite-difference \(\frac{d^2 OD}{dt^2} > 3.5 \times 10^{-5}\).
- Use 100 `emcee` walkers, 6000 iterations, 3300 burn-in iterations, and thinning by 20; retain a 200-member ensemble from samples within the 95% marginal intervals.
- Use normalized mean squared error as the primary mechanistic fit criterion, with per-condition normalization by OD range as in the objective functions.
- Validate mechanistic fits by predicting extracted-phage time courses, not by k-fold cross-validation.
- For lysogen quantification, fit exponential growth in log space over OD values between about 0.02 and 0.1, then extrapolate back to the dilution time.
- Fit lysogeny-vs-MOI curves in log space using the Poisson single-cell-MOI model with infection-efficiency parameter \(a\) and \(q_1 \le q_2\).
- Scan \(\mathrm{MOI}^* \in \{1,2,3\}\) when fitting the single-cell lysogenization model; use \(\mathrm{MOI}^*=2\) as the default for growing cells and \(\mathrm{MOI}^*=1\) where stationary-cell fits require it.
- Include the high-MOI repression term \(R_n\) only when the bulk lysogeny curve turns downward at high MOI.
- For growth-rate response surfaces, interpolate sampled data with triangulation-based natural-neighbor interpolation and smooth with a 2D median filter.
- For spontaneous induction, fit OD and phage data jointly with the same lytic parameter family used for infection dynamics; include the 10-fold reduced adsorption term in glucose-grown lysogens.
- Preferred plotting: raw and fitted growth curves, lysis OD vs \(\log_{10}\) phage concentration, parity plots against plaque counts, fold-change and CV scatter plots, OD/phage overlays with ensemble bands, parameter-distribution plots, \(R\) vs normalized host growth rate, lysogeny-vs-MOI curves, and MOI–growth-rate heatmaps.

## What to Approve
- A plan that first standardizes each plate run separately, performs blank subtraction, and verifies control wells before fitting anything.
- Use of the exact calibration forms for complex versus minimal media, with matched-condition calibration for unknowns.
- Use of the sequential Monod host-growth model and explicit \(\varepsilon(N)\) handling for LB-based media.
- A mechanistic infection-analysis plan that includes the null model plus all three growth-dependent alternatives, not just one favored model.
- Use of simulated annealing for best-fit estimation and `emcee` with the specified walker/iteration settings for ensemble sampling.
- Validation via phage-timecourse prediction and not only OD fit quality.
- Lysogeny analysis that extrapolates selective-growth curves back to the dilution time and fits the Poisson MOI model in log space with \(q_1 \le q_2\).
- A spontaneous-induction plan that jointly fits OD and phage data and preserves the growth-dependent induction-rate formulation.
- Careful use of the local files: `TECAN_*.csv` for raw OD trajectories, `20220901_*` and `20221022_*` workbooks for infection/detection-plate lysogeny assays, and `d20230216_*` MAT files as auxiliary processed inputs for the response-surface stage.

## What to Push Back On
- Skipping blank subtraction, control inspection, or plate-by-plate annotation.
- Using generic logistic/Gompertz growth in place of the sequential Monod framework for the mechanistic analyses.
- Ignoring the time-varying OD-to-cell-density conversion in LB-based media.
- Inferring lytic parameters from lysis OD alone instead of fitting the full OD trajectories.
- Fitting only one mechanistic model variant or omitting the null-model comparison.
- Reporting only point estimates without MCMC-based ensemble uncertainty.
- Substituting arbitrary smoothing, arbitrary peak thresholds, or heuristic classification rules that are not in the design.
- Using k-fold cross-validation language as a substitute for the actual validation strategy.
- Fitting lysogeny curves in linear space, omitting the infection-efficiency parameter \(a\), or dropping the \(q_1 \le q_2\) constraint.
- Failing to distinguish the fixed-growth lysogeny assay from the growth-rate response-surface assay.
- Omitting the extracted-phage prediction step, the \(R\) calculation, or the spontaneous-induction analysis.
- Implementing the induction model with the phage adsorption term missing the phage variable; the adsorption loss must be proportional to phage abundance.

## Domain Interests
- The lysis feature should be sharp, reproducible across replicates, and easy to identify as the first post-infection local maximum.
- In complex media, the calibration should look approximately linear in lysis OD vs \(\log_{10}\) phage input; in minimal media, the transformed power-law form should be more appropriate.
- The null lytic model should struggle relative to growth-dependent variants if host physiology materially affects infection kinetics.
- Even when \(r\), \(B\), and \(\tau\) are individually sloppy, their combinations should show structured constraints; the plane-like relationship in \((\log_{10} r,\log_{10} B,\tau)\) space is a useful signal.
- The composite parameter \(R\) should be more stable across ensemble samples than the individual infection parameters.
- The low-input assay should show a bimodal \(\Delta OD\) distribution separating lysed from unlysed wells.
- The inferred lysogenization model should preserve basic biological ordering, especially \(q_1 \le q_2\), and should only invoke high-MOI repression when the bulk data require it.
- Growth-state effects should appear coherently across analyses: lytic performance, entry into lysogeny, and spontaneous induction should all track host physiology in a biologically plausible way.
- Independent runs should agree qualitatively even when point-parameter estimates differ.

## Implementation Specifications
2. **Rebuild the OD-based phage-counting calibration pipeline and matched-condition inference**
   - **Equations**:
     - Complex media calibration:
       \[
       y = kx + b
       \]
       where \(y\) is the lysis OD and \(x=\log_{10}(\text{initial phage concentration in PFU/mL})\).
     - Minimal media calibration:
       \[
       \log_{10} y = kx + b
       \]
   - **Thresholds**:
     - Lysis OD = first local maximum in the blank-subtracted OD trajectory after phage addition.
   - **Sample assignments**:
     - Use the `TECAN_*.csv` plate runs that contain serial phage dilutions plus uninfected controls.
     - Keep calibration and unknown samples matched by host, phage, medium, and temperature.
     - Use `TECAN_230119_fig3.csv` as the first candidate multi-MOI lytic dataset; inspect the other TECAN runs for additional calibration-style plates or repeats.
   - **Implementation constraints**:
     - Subtract the mean OD of blank-medium wells from every well on the same plate.
     - When inferring unknown phage concentration, use the calibration from the same plate if both calibration and unknown are present together.
     - Also implement the alternative interpolation analysis: identify the two calibration points immediately below and above the unknown lysis OD and interpolate only between those two points.
     - Use simple linear regression tools such as `scipy.optimize.curve_fit`, `numpy.polyfit`, or equivalent; do not replace the specified functional forms.

3. **Reproduce the low-input single-phage detection analysis**
   - **Equations**:
     - Number of phages in a 10 µL aliquot:
       \[
       P(X=x)=\frac{\lambda^x e^{-\lambda}}{x!}
       \]
     - Probability of at least one phage in an aliquot:
       \[
       \pi_0 = 1-e^{-\lambda}
       \]
     - Number of positive wells among \(N\) wells:
       \[
       P(Y=y)=\binom{N}{y}\pi_0^y(1-\pi_0)^{N-y}
       \]
     - Two-tailed exact binomial test:
       \[
       p=\sum_{i\in \mathcal{I}} \binom{N}{i}\pi_0^i(1-\pi_0)^{N-i},
       \quad
       \mathcal{I}=\{i: P(Y=i)<P(Y=k)\}
       \]
   - **Parameters**:
     - \(\lambda = 0.38\) PFU per 10 µL aliquot.
     - \(N=32\) infected wells.
     - 10 uninfected control wells.
   - **Thresholds**:
     - \(\Delta OD = OD_{\text{first local max}} - OD_{\text{subsequent min}}\).
     - Classify a well as lysed if \(\Delta OD \ge 0.3\).
   - **Implementation constraints**:
     - Use LBMM data for this analysis.
     - Record for 48 h.
     - Do not use a normal approximation for the binomial test.
     - Compare the measured fraction of lysed wells against the Poisson/binomial expectation, with SEM from bootstrapping if you show uncertainty.

4. **Parameterize host growth for each medium**
   - **Equations**:
     - Monod growth:
       \[
       g(N)=v\frac{N}{N+K}
       \]
     - Sequential growth-phase model for phase \(i\), with \(\theta_i \le N < \theta_{i-1}\):
       \[
       \frac{dN}{dt}=-e\,U\,v_i\frac{N}{N+K_i}, \qquad
       \frac{dU}{dt}=U\,v_i\frac{N}{N+K_i}
       \]
     - Objective:
       \[
       R(\{v_i\},\{K_i\},\{\theta_i\},e)
       =\sum_{t\in T_0}\left[OD(t)-\widehat{U}(t)\varepsilon(t)\right]^2
       \]
   - **Parameters**:
     - Scan the number of phases \(X\) from 1 to 3.
     - Set \(N(0)=1\).
     - Set \(U(0)=OD(0)/\varepsilon(0)\).
     - For minimal media, use \(\varepsilon_0 = 10^{-9}\ \mathrm{CFU}^{-1}\,\mathrm{mL}\).
     - ODspec-to-plate-reader OD conversion factor: \(OD_{spec}/OD = 4.51\).
   - **Sample assignments**:
     - Use uninfected wells from the TECAN plates for within-experiment host growth trajectories.
     - Use the published Sezonov growth/size dataset, together with the deposited scripts if needed, to reconstruct \(\varepsilon(N)\) for LB-based media.
   - **Implementation constraints**:
     - Use simulated annealing to fit \(\{v_i,K_i,\theta_i,e\}\).
     - For minimal media, default to \(X=1\).
     - For LB-based media, use \(X=3\) and fit \(\varepsilon(N)\) via the same polynomial form used in the deposited scripts; if the polynomial degree is not recoverable from the scripts, stop and ask rather than inventing a new form.
     - Repeat the simulated-annealing fit multiple times to assess stability.

5. **Fit mechanistic ODE models of lytic infection**
   - **Equations**:
     - Base infection model:
       \[
       \frac{dN}{dt}= -e\left(U+\sum_{i=1}^{M}I_i\right)g(N)
       \]
       \[
       \frac{dU}{dt}=Ug(N)-rUP
       \]
       \[
       \frac{dI_1}{dt}=rUP-\frac{M}{\tau}I_1
       \]
       \[
       \frac{dI_i}{dt}= \frac{M}{\tau}(I_{i-1}-I_i), \quad i=2,\dots,M
       \]
       \[
       \frac{dP}{dt}=B\frac{M}{\tau}I_M-r\left(U+\sum_{i=1}^{M}I_i\right)P
       \]
     - Growth-rate normalization:
       \[
       \phi = \frac{g(N)}{\max(g(N))}
       \]
     - Model variants:
       - Null model: \(r,B,\tau\) constant.
       - \(r\)-model:
         \[
         r = \max(0, r_k\phi + r_0)
         \]
       - \(B\)-model:
         \[
         B = \max(0, B_k\phi + B_0)
         \]
       - \(\tau\)-model:
         \[
         \tau = \max(20, \tau_k\phi + \tau_0)
         \]
     - Fitting objective:
       \[
       R(r,B,\tau)=\sum_{j=1}^{J}\sum_{t\in T_{o,j}}
       \frac{1}{|T_{o,j}|}
       \left[
       \frac{
       \left(\widehat{U}_j(t)+\sum_{i=1}^{M}\widehat{I}_{i,j}(t)\right)\varepsilon(\widehat{N}_j(t)) - OD_j(t)
       }{
       \max OD_j - \min OD_j
       }
       \right]^2
       \]
   - **Parameters**:
     - Set \(M=5\).
     - For LBM, use \(\max(g(N)) = v_1/(1+K_1)=0.035\ \mathrm{min}^{-1}\).
     - Initial conditions:
       \[
       N(0)=1,\quad U_j(0)=OD_j(0)/\varepsilon(N(0)),\quad I_i(0)=0
       \]
       and set \(P_j(0)\) from the known initial phage concentration for condition \(j\).
   - **Sample assignments**:
     - Use `TECAN_230119_fig3.csv` as the primary candidate for the multi-MOI OD fitting stage.
     - Use additional `TECAN_*.csv` runs as biological repeats or alternate media once their assay type is confirmed.
   - **Implementation constraints**:
     - Use simulated annealing for best-fit optimization.
     - Then use `emcee` with a uniform prior, 100 walkers, 6000 iterations, 3300 burn-in, and thinning by 20.
     - Use the exact prior ranges encoded in the deposited scripts or supplementary tables; if those ranges cannot be recovered, stop and ask rather than substituting ad hoc priors.
     - Retain a 200-member ensemble sampled from within the 95% marginal intervals.
     - For \(\lambda_{ts}\) infection in LBM, fit only OD points with centered finite-difference \(\frac{d^2OD}{dt^2} > 3.5\times10^{-5}\).
     - Compare null, \(r\)-, \(B\)-, and \(\tau\)-models using normalized MSE and visual agreement.

6. **Predict phage time courses, derive the composite viral-growth parameter, and optionally model recovery**
   - **Equations**:
     - Predicted total measurable phages in extracted samples:
       \[
       \widehat{P}_{all}(t)=\widehat{P}(t)+B\widehat{I}_M(t)
       \]
     - Composite parameter:
       \[
       R=\frac{rB}{\exp(\tau g^*)}
       \]
     - Plane constraint in minimal media:
       \[
       \tau = \alpha\,[\log_{10}r+\log_{10}B]+\beta
       \]
     - Optional recovery extension:
       \[
       \frac{dN}{dt}= -e\left(U+R+\sum_{i=1}^{M}I_i\right)g(N)+k_f\frac{M}{\tau}I_M
       \]
       \[
       \frac{dU}{dt}=Ug(N)-rUP-k_mU
       \]
       \[
       \frac{dR}{dt}=Rg(N)+k_mU
       \]
       \[
       \frac{dD}{dt}=\frac{M}{\tau}I_M
       \]
       with the infection and phage equations otherwise preserved.
     - Recovery-fit objective:
       use the same normalized OD residual as above, but with observable
       \[
       \left(U+R+0.1D+\sum_{i=1}^{M}I_i\right)\varepsilon(N)
       \]
   - **Parameters**:
     - Debris absorptivity = 0.1 of an intact cell.
   - **Implementation constraints**:
     - Validate the lytic model by comparing \(\widehat{P}_{all}(t)\) to measured extracted-phage concentrations.
     - Compare uncertainty in \(R\) to uncertainty in \(r\), \(B\), and \(\tau\), preferably using coefficient of variation over the ensemble.
     - For LBM, compute \(R(\phi)\) separately for the \(r\)-, \(B\)-, and \(\tau\)-model ensembles.
     - Treat recovery modeling as a second-pass extension after the early-lysis model is working.

7. **Quantify lysogen abundance and infer single-cell lysogenization vs MOI**
   - **Equations**:
     - Exponential growth used for extrapolation:
       \[
       N(t)=N_0 e^{gt}
       \]
     - Frequency of lysogeny:
       \[
       f_{\text{lysogeny}}=\frac{L_0}{T_0}
       \]
     - Single-cell MOI distribution:
       \[
       P_n=\frac{(aM)^n e^{-aM}}{n!}
       \]
     - Bulk lysogeny:
       \[
       f_{\text{lysogeny}}=\sum_{n=0}^{\infty}P_nQ_n
       \]
     - For \(\mathrm{MOI}^*=2\):
       \[
       f_{\text{lysogeny}} = P_1q_1 + (1-P_0-P_1)q_2
       \]
     - High-MOI repression term:
       \[
       R_n=
       \begin{cases}
       1 & 0\le n < \mathrm{MOI}^*\\
       e^{-k(n-\mathrm{MOI}^*)} & n\ge \mathrm{MOI}^*
       \end{cases}
       \]
       so that
       \[
       f_{\text{lysogeny}}=\sum_{n=0}^{\infty}P_nQ_nR_n
       \]
     - Objective:
       \[
       R(a,q_1,q_2,k)=\sum_M\left[\log f_{\text{lysogeny}}-\log \widehat{f}_{\text{lysogeny}}\right]^2
       \]
   - **Parameters**:
     - Scan \(\mathrm{MOI}^* = 1,2,3\).
     - Impose \(q_1 \le q_2\).
     - Use kanamycin at 50 \(\mu\)g/mL in the detection stage.
   - **Thresholds**:
     - Fit the selective and nonselective detection-plate growth curves only over OD \(\approx 0.02\) to \(0.1\).
   - **Sample assignments**:
     - Use `20220901_ODbasedMOIresponse_optimalphysio_infectionplate.xlsx` together with `20220901_ODbasedMOIresponse_optimalphysio_detectionplate.xlsx` for the fixed-growth infection/detection workflow.
     - Use `20221022_ODbasedMOIresponse_LBM_run2.xlsx` as an independent repeat for the same analysis family.
   - **Implementation constraints**:
     - Fixed-growth assay design: infect for 15 min at 30°C, dilute 250-fold into fresh medium, allow 45 min growth, then apply kanamycin selection and track OD for 24 h.
     - For each condition, extrapolate the selective-growth curve \(L(t)\) and the uninfected nonselective curve \(T(t)\) back to the dilution time \(t=0\).
     - Fit in log space because the MOI axis and lysogeny frequencies span orders of magnitude.
     - Include the repression term only when the high-MOI tail decreases.

8. **Build the lysogeny response surface across host growth rates**
   - **Equations**:
     - Pre-infection growth-rate estimation:
       \[
       N(t)=N_0 e^{gt}
       \]
       fitted in log space over the 30 min pre-infection segment.
     - Phenomenological growth-rate dependencies:
       \[
       \log a = \beta_2 g^2 + \beta_1 g + \beta_0
       \]
       \[
       \log q_1 = \beta_1 g + \beta_0
       \]
       \[
       \log q_2=
       \begin{cases}
       \beta_1 g + \beta_0 & g<g^*\\
       \beta_2 g + (\beta_1-\beta_2)g^*+\beta_0 & g\ge g^*
       \end{cases}
       \]
       \[
       k=
       \begin{cases}
       0 & g<g_1\\
       -(g-g_1)(g-g_2) & g_1\le g<g_2\\
       0 & g\ge g_2
       \end{cases}
       \]
   - **Parameters**:
     - Scan MOI from \(10^{-3}\) to \(10^2\) when generating the surface.
     - Scan host growth rate from 0 to \(1.25\ \mathrm{h}^{-1}\) for the fitted surface.
   - **Sample assignments**:
     - Use `d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat` and `d20230216_ODbasedMOIresponsesurface_run2_24-Feb-2023.mat` as auxiliary processed data for the response-surface stage.
     - Use the Excel workbooks as the raw/near-raw source for infection and detection measurements when reconstructing from scratch.
   - **Implementation constraints**:
     - Use six growth-state series and six MOI levels per series when reconstructing the experiment.
     - In the growth-rate version of the assay, impose kanamycin immediately after the dilution into the detection plate.
     - Fit each growth-rate-specific lysogeny-vs-MOI curve first, then fit the growth-rate dependence of \(a,q_1,q_2,k\).
     - Compare the modeled surface with an interpolated experimental surface generated using natural-neighbor interpolation plus 2D median filtering.
     - Use bootstrap resampling to quantify uncertainty in the growth-rate trend fits.

9. **Fit the spontaneous-induction model**
   - **Equations**:
     - Induction-rate dependence on normalized host growth:
       \[
       k_i = \max(0, k_{ik}\phi + k_{ib})
       \]
     - Lysogen-induction model:
       \[
       \frac{dN}{dt}= -e\left(L+\sum_{i=1}^{M}I_i\right)g(N)
       \]
       \[
       \frac{dL}{dt}=Lg(N)-k_iL
       \]
       \[
       \frac{dI_1}{dt}=k_iL-\frac{M}{\tau}I_1
       \]
       \[
       \frac{dI_i}{dt}= \frac{M}{\tau}(I_{i-1}-I_i), \quad i=2,\dots,M
       \]
       \[
       \frac{dP}{dt}=B\frac{M}{\tau}I_M-0.1\,r\left(L+\sum_{i=1}^{M}I_i\right)P
       \]
       The factor \(0.1\) implements the 10-fold lower adsorption in glucose-grown cells.
     - Joint objective:
       \[
       R(k_{ik},k_{ib})=
       \frac{1}{|T_O|}\sum_{t\in T_O}
       \left[
       \frac{(\widehat{L}(t)+\sum_i\widehat{I}_i(t))\varepsilon(\widehat{N}(t))-OD(t)}
       {\max OD-\min OD}
       \right]^2
       +
       \frac{1}{|T_P|}\sum_{t\in T_P}
       \left[
       \frac{\log(\widehat{P}(t)+B\widehat{I}_M(t))-\log P(t)}
       {\max \log P-\min \log P}
       \right]^2
       \]
   - **Parameters**:
     - Use the same \(M=5\) latent-period discretization.
     - Use the \(r,B,\tau\) parameter family inherited from the corresponding LBM lytic-model fit.
   - **Sample assignments**:
     - Use the lysogen-growth time courses and extracted-phage counts associated with the later TECAN/auxiliary files after confirming assay identity.
   - **Implementation constraints**:
     - Parameterize LBGM host growth with the same sequential Monod framework as the other LB-based assays, using \(X=3\).
     - Sample phages at inoculation and at OD milestones near 0.01, 0.02, 0.04, 0.25, 0.30, 0.50, and 1.00 when reconstructing the experiment.
     - Fit OD and phage data jointly.
     - Test models with and without adsorption, but preserve the same growth-dependent \(k_i\) parameterization in both cases.
     - Do not omit the multiplicative \(P\) term in the adsorption loss; the published typeset equation is dimensionally incomplete without it.

## Communication Style
- You are the researcher who designed these experiments. When approving a plan, include ALL implementation-critical specifications the agent needs: exact equations, parameter constraints, sample assignments, threshold values. Front-load the specs — do not wait to see if the agent gets it right.
- After each stage, proactively state the next research direction with specific methods and parameters.
- Give specific, actionable feedback when reviewing plans.
- Approve explicitly with "approved" or "go ahead" when satisfied.
- Keep responses to 3-5 sentences. Specs can be longer when needed.
- Ask for clarification on vague method descriptions.
- NEVER reference "the paper", "the brief", or "the protocol". Speak from your own research experience as if you designed everything yourself.
- NEVER attempt to use tools, read files, or call functions. You can only communicate through text responses to the agent.
