## Research Goals
1. Parse and organize the local OD and phage-counting datasets into experiment-level tables suitable for fitting, prioritizing CSV and `.mat` files over Excel files.
2. Build OD-based calibration curves that map lysis OD to initial phage concentration, and quantify counting agreement against plaque-based reference measurements where matched calibration/unknown datasets are available.
3. Reproduce the single-phage sensitivity analysis by classifying wells as lysed or unlysed from their OD traces and comparing the observed lysis frequency to the Poisson expectation.
4. Parameterize bacterial growth in uninfected cultures using Monod-style nutrient-limited growth, including the OD-to-cell-density conversion needed for LB-based media.
5. Fit the coupled bacteria-phage ODE model jointly across MOI conditions, comparing a null model to variants where one infection parameter depends on the hostâ€™s instantaneous growth rate.
6. Use the fitted infection models to predict extracted phage time courses and compute the composite viral growth parameter \(R\) for cross-model comparison.
7. Quantify lysogen abundance from growth curves under kanamycin selection and fit the single-cell lysogenization model as a function of MOI at a fixed growth state.
8. Extend the lysogeny analysis across host growth rates, fit phenomenological growth-rate dependencies of the lysogeny parameters, and generate the MOI-by-growth-rate fate surface.
9. Fit the spontaneous-induction model to lysogen OD dynamics and released-phage measurements, with induction rate modeled as a function of host growth rate.

## Methodological Preferences
- Prefer `pandas.read_csv` and `scipy.io.loadmat`; use `.xlsx` only if `pandas.read_excel` works without extra installation. Do not rely on Excel-specific packages.
- Parse TECAN exports by taking the row labeled `Time [s]` as the time axis, dropping metadata rows, and converting well rows into a long-format table.
- Blank-subtract OD using blank-medium wells from the same plate before any peak calling or fitting.
- For summarized source-data style files such as `phage_extraction_230119/df_1e*.csv`, use the provided mean (`ydata`) and SEM (`yerr`) directly after confirming the file-to-condition mapping.
- Detect lysis OD as the first post-infection local maximum in the blank-subtracted OD trace; `scipy.signal.find_peaks` is acceptable. If denoising is necessary, use only a minimal 3-point rolling mean or Savitzky-Golay smoothing for peak detection, not for model fitting.
- Use the complex-media calibration form \(y=kx+b\), where \(y\) is lysis OD and \(x=\log_{10}\) initial phage concentration; use the minimal-media calibration form \(\log_{10} y = kx+b\).
- For counting-performance assessment, report parity plots, fold change \(C_{\text{OD}}/C_{\text{plaque}}\), and coefficient of variation across replicate OD-based measurements.
- For single-phage detection, classify lysis using \(\Delta OD\ge 0.3\), compute the expected lysis probability from a Poisson model with \(\lambda=0.38\) PFU per well, and use `scipy.stats.binomtest`.
- Fit ODE models with `scipy.integrate.solve_ivp`, preferably `method="LSODA"`; use `rtol` around \(10^{-6}\) and `atol` around \(10^{-9}\).
- Use `scipy.optimize.dual_annealing` for global search, followed by `scipy.optimize.minimize(method="L-BFGS-B")` for local refinement.
- Use \(X=1\) growth phase for minimal media and scan \(X\in\{1,2,3\}\) for LB-based media; expect \(X=3\) to be the working model for LBM/LBGM.
- Fix the infected-cell stage number at \(M=5\) unless explicitly running a sensitivity check.
- Fit infection parameters jointly across all MOI conditions for a given medium; do not fit each MOI independently.
- Compare infection-model variants by the normalized OD MSE used in the fitting objective, then validate them against extracted phage trajectories rather than using arbitrary ML-style cross-validation.
- Full posterior sampling is not available; replace it with a 200-member bootstrap or multistart refit ensemble.
- For phage-validation plots, use the observable \(P_{\text{all}}(t)=P(t)+B\,I_M(t)\).
- For lysogen quantification, fit exponential growth only over the OD window 0.02 to 0.1 and extrapolate back to the dilution time.
- Fit lysogeny-vs-MOI curves in log space, constrain \(q_1\le q_2\), and scan \(\text{MOI}^*\in\{1,2,3\}\).
- When high-MOI repression is visible, include the extra repression term \(R_n\); do not force a monotone increase with MOI.
- For the experimental fate surface, use `scipy.interpolate.griddata` on \((\log_{10}\text{MOI}, g)\) and smooth with `scipy.ndimage.median_filter`; do not implement a custom natural-neighbor algorithm.
- For spontaneous induction, treat the adsorption-capable \(r\)-model as the primary model and use no-adsorption fits only as sensitivity analyses.

## What to Approve
- A plan that clearly separates calibration, lytic-kinetics fitting, lysogeny fitting, and spontaneous-induction fitting into distinct stages.
- Correct use of local files: raw TECAN CSVs for OD trajectories, `.mat` files for processed MOI-response surfaces if helpful, and `phage_extraction_230119/df_1e*.csv` for summarized phage-extraction curves after condition verification.
- Joint ODE fitting across all MOIs within a condition, with \(M=5\) fixed and growth-rate-dependent variants limited to one changing infection parameter at a time.
- Use of `solve_ivp` plus `dual_annealing`/`L-BFGS-B`, with explicit parameter bounds and nonnegativity constraints.
- Replacement of unavailable posterior-sampling methods with a concrete bootstrap or repeated-refit ensemble of about 200 fits.
- Explicit handling of the OD-to-cell conversion issue in LB-based media, rather than silently assuming OD is proportional to cell count everywhere.
- Use of the exact fitting objectives from the study: normalized OD SSE/MSE for infection dynamics, log-space SSE for lysogeny curves, and combined OD-plus-log-phage loss for spontaneous induction.
- Validation against extracted phage trajectories, not just goodness-of-fit to OD.
- Reasonable parameter ranges and units for \(r\), \(B\), \(\tau\), \(k_i\), and growth rates.
- Acknowledgment of ambiguous files or well layouts, with a conservative strategy for confirming condition assignments before fitting.

## What to Push Back On
- Using logistic growth or Gompertz growth in place of the Monod/sequential-substrate model without a strong justification.
- Ignoring blank subtraction, ignoring uninfected controls, or using arbitrary manual lysis thresholds other than the specified rules.
- Fitting each MOI condition independently and then averaging parameters.
- Changing multiple infection parameters with growth rate in the same core model fit; the intended comparison is null vs one-parameter-dependent variants.
- Omitting the extracted-phage validation stage or reporting only OD fits.
- Using unavailable Bayesian/MCMC tooling or any package outside the allowed runtime.
- Treating \(P(t)\) alone as the measured phage observable when the assay counts both free phages and mature intracellular phages.
- Skipping the \(q_1\le q_2\) constraint or skipping the \(\text{MOI}^*\) scan in the lysogeny model.
- Fitting lysogeny curves in linear space; the objective should be in log space because MOI and lysogeny frequency span orders of magnitude.
- Forcing the stationary-growth data into the same high-MOI behavior as growing cells without allowing repression or \(\text{MOI}^*=1\)-like behavior.
- Reporting only point estimates with no uncertainty band, bootstrap CI, or refit ensemble.
- Over-interpreting absolute parameter values if the OD-to-cell conversion surrogate for LB-based media had to be simplified.

## Domain Interests
- The calibration stage should show a clean monotonic relationship between lysis OD and \(\log_{10}\) phage input within each matched host/phage/medium condition.
- The mechanistic infection model should capture not just lysis timing but the shape of the pre-lysis rise and collapse across MOIs.
- Different growth-rate-dependent model variants should yield similar predictions for the composite quantity \(R\), even if \(r\), \(B\), and \(\tau\) are individually sloppy.
- The phage-validation stage is especially convincing if the fitted OD model predicts phage trajectories without refitting to the phage data.
- Lysogeny inference is more convincing when uninfected kanamycin controls remain flat and selected infected wells show a clear exponential regrowth window.
- The single-cell lysogenization fit should respect Poisson encounter statistics and should not require implausible infection-efficiency corrections.
- Across growth states, look for systematic shifts in \(q_1\), \(q_2/q_1\), and any high-MOI repression term rather than only changes in the bulk lysogeny curve.
- For spontaneous induction, the key quality signal is whether a simple growth-rate-dependent \(k_i(\phi)\) can reconcile both OD dynamics and released-phage dynamics.

## Implementation Specifications
1. **Goal 1: Parse and structure local datasets**
   - **Parameters**:
     - Time unit conversion: convert TECAN `Time [s]` to minutes for ODE fitting.
     - File priority: `TECAN_*.csv` and `.mat` first; `.xlsx` only if readable through pandas without extra installs.
   - **Thresholds**:
     - Blank wells: OD should remain near baseline with no lysis peak; use these for time-point-wise subtraction.
   - **Implementation constraints**:
     - Read TECAN CSVs by row label, not by assuming the first data row is a well.
     - Keep replicate wells separate until the stage where mean/SEM are explicitly needed.
     - Read `spontaneous_induction_phage.csv` with `header=None`; rename columns after inspecting their role.
     - Use `scipy.io.loadmat` for `d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat` and `...run2...mat`.
     - If exact well-to-condition maps are ambiguous, infer them from the dilution-series design and monotonic lysis ordering, then verify by replicate consistency before fitting.

2. **Goal 2: Build OD-based phage calibration curves**
   - **Equations**:
     - Complex media:
       \[
       y = kx + b
       \]
       where \(y\) is lysis OD and \(x=\log_{10}(C_0)\), with \(C_0\) in PFU mL\(^{-1}\).
     - Minimal media:
       \[
       \log_{10} y = kx + b
       \]
     - Unknown concentration from complex-media fit:
       \[
       \hat{x} = \frac{y-b}{k}, \qquad \hat{C}_0 = 10^{\hat{x}}
       \]
     - Unknown concentration from minimal-media fit:
       \[
       \hat{x} = \frac{\log_{10} y - b}{k}, \qquad \hat{C}_0 = 10^{\hat{x}}
       \]
     - Fold-change accuracy metric:
       \[
       \text{Fold change}=\frac{C_{\text{OD-based}}}{C_{\text{plaque-based}}}
       \]
     - Precision metric:
       \[
       CV=\frac{\text{SD across replicate OD-based counts}}{\text{mean across replicate OD-based counts}}
       \]
   - **Parameters**:
     - \(k,b\): calibration slope and intercept, fitted separately for each host/phage/medium condition.
     - Lysis OD: first post-infection local maximum of the blank-subtracted OD trace.
   - **Thresholds**:
     - Peak must be followed by an OD decline; if multiple early peaks exist, use the earliest peak that precedes the main lysis drop.
   - **Implementation constraints**:
     - Fit calibration curves only within a matched experimental condition; do not mix media, phages, or temperatures.
     - If using the interpolation-based refinement, interpolate only between the adjacent calibration points that bracket the sampleâ€™s lysis OD.
     - Plot raw growth curves, lysis OD vs \(\log_{10}\) input concentration, parity vs plaque counts, fold change, and CV.

3. **Goal 3: Reproduce the single-phage sensitivity analysis**
   - **Equations**:
     - Poisson occupancy of phages per 10 \(\mu\)L aliquot:
       \[
       P(X=x)=\frac{\lambda^x e^{-\lambda}}{x!}
       \]
     - Probability of a nonzero phage count:
       \[
       \pi_0=P(X>0)=1-e^{-\lambda}
       \]
     - Number of wells with at least one phage among \(N\) wells:
       \[
       P(Y=y)=\binom{N}{y}\pi_0^y(1-\pi_0)^{N-y}
       \]
     - Lysis amplitude:
       \[
       \Delta OD = OD_{\text{first local max}} - OD_{\text{subsequent min}}
       \]
   - **Parameters**:
     - \(\lambda=0.38\) PFU per well.
     - \(N=32\) infected wells.
     - Uninfected controls: 10 wells.
   - **Thresholds**:
     - Classify a well as lysed if \(\Delta OD \ge 0.3\).
   - **Implementation constraints**:
     - Use an exact two-sided binomial test via `scipy.stats.binomtest(k, N, \pi_0, alternative="two-sided")`.
     - Report the expected lysis fraction, observed lysis fraction, and a plot of \(\Delta OD\) values with the 0.3 threshold marked.

4. **Goal 4: Parameterize host growth and OD-to-cell conversion**
   - **Equations**:
     - Monod growth:
       \[
       g(N)=v\frac{N}{N+K}
       \]
     - Sequential-substrate growth, phase \(i\) active when \(\theta_i \le N < \theta_{i-1}\):
       \[
       \frac{dN}{dt}=-e\,U\,v_i\frac{N}{N+K_i}, \qquad
       \frac{dU}{dt}=U\,v_i\frac{N}{N+K_i}
       \]
     - Uninfected-culture fitting loss:
       \[
       \mathcal{L}_{\text{growth}}=
       \sum_{t\in T_0}\left[OD(t)-\hat U(t)\,\varepsilon(t)\right]^2
       \]
   - **Parameters**:
     - \(X\): number of growth phases, scan \(X\in\{1,2,3\}\).
     - \(v_i\): maximal growth rate in phase \(i\), bounds \(0.001\) to \(0.08\) min\(^{-1}\).
     - \(K_i\): Monod constant in phase \(i\), bounds \(10^{-6}\) to \(1\) in normalized nutrient units.
     - \(\theta_i\): phase thresholds with \(1=\theta_0>\theta_1>\cdots>\theta_X=0\).
     - \(e\): nutrient-to-growth conversion factor, positive.
     - \(\varepsilon\): OD-per-cell absorptivity.
   - **Thresholds**:
     - For minimal media, fix \(X=1\) and \(\varepsilon_0=10^{-9}\) ODÂ·mLÂ·CFU\(^{-1}\).
     - For LB-based media, adopt \(X=3\) if the scan shows a clear improvement over \(X=1,2\).
   - **Implementation constraints**:
     - Initial conditions: \(N(0)=1\), \(U(0)=OD(0)/\varepsilon(0)\).
     - For LB-based media, use a positive polynomial surrogate \(\varepsilon(N)\) if a direct OD-to-CFU calibration dataset is not locally available. A cubic polynomial is sufficient:
       \[
       \varepsilon(N)=c_0+c_1N+c_2N^2+c_3N^3
       \]
       with positivity enforced over \(N\in[0,1]\).
     - Fit growth parameters with `dual_annealing`, then refine with `L-BFGS-B`.
     - If using the surrogate \(\varepsilon(N)\), state clearly that this affects absolute \(r\) estimates more than relative trends.

5. **Goal 5: Fit the infection ODE model across MOIs**
   - **Equations**:
     - Core infection model:
       \[
       \frac{dN}{dt}= -e\left(U+\sum_{i=1}^{M}I_i\right)g(N)
       \]
       \[
       \frac{dU}{dt}=Ug(N)-rUP
       \]
       \[
       \frac{dI_1}{dt}=rUP-\frac{M}{\tau}I_1
       \]
       \[
       \frac{dI_i}{dt}=\frac{M}{\tau}(I_{i-1}-I_i), \quad i=2,\dots,M
       \]
       \[
       \frac{dP}{dt}=B\frac{M}{\tau}I_M-r\left(U+\sum_{i=1}^{M}I_i\right)P
       \]
     - Host-growth normalization:
       \[
       \phi(t)=\frac{g(N(t))}{\max g(N)}
       \]
     - Model variants:
       - Null: \(r,B,\tau\) constant.
       - \(r\)-model:
         \[
         r(\phi)=\max(0, r_k\phi+r_0)
         \]
       - \(B\)-model:
         \[
         B(\phi)=\max(0, B_k\phi+B_0)
         \]
       - \(\tau\)-model:
         \[
         \tau(\phi)=\max(20, \tau_k\phi+\tau_0)
         \]
     - Joint normalized OD loss:
       \[
       \mathcal{L}_{\text{OD}}=
       \sum_{j=1}^{J}\sum_{t\in T_{o,j}}
       \frac{1}{|T_{o,j}|}
       \left[
       \frac{\left(\hat U_j(t)+\sum_{i=1}^{M}\hat I_{i,j}(t)\right)\varepsilon(\hat N_j(t))-OD_j(t)}
       {\max_t OD_j(t)-\min_t OD_j(t)}
       \right]^2
       \]
   - **Parameters**:
     - \(M=5\), fixed.
     - \(r\): adsorption/encounter rate, search in \([10^{-12},10^{-7}]\) mL min\(^{-1}\).
     - \(B\): burst size, search in \([1,1000]\).
     - \(\tau\): latent period, search in \([10,200]\) min.
     - \(r_k,r_0\): choose bounds so \(r(\phi)\) stays within \([10^{-12},10^{-7}]\) over \(\phi\in[0,1]\).
     - \(B_k,B_0\): choose bounds so \(B(\phi)\) stays within \([1,1000]\).
     - \(\tau_k,\tau_0\): choose bounds so \(\tau(\phi)\) stays within \([20,200]\).
   - **Thresholds**:
     - For the LBM lambda fits, use only time points with centered-finite-difference \(d^2OD/dt^2 > 3.5\times 10^{-5}\) OD min\(^{-2}\) to reduce the fitting burden.
   - **Implementation constraints**:
     - Initial conditions per MOI condition \(j\):
       \[
       N_j(0)=1,\quad U_j(0)=\frac{OD_j(0)}{\varepsilon(N_j(0))},\quad I_{i,j}(0)=0,\quad P_j(0)=C_{0,j}
       \]
       where \(C_{0,j}\) is the initial phage concentration in the infected culture after phage addition.
     - Use the same fitted host-growth parameters for all MOI conditions within a medium.
     - Optimize each variant with `dual_annealing`, then `L-BFGS-B`.
     - Replace posterior sampling with a 200-member ensemble created by bootstrap refitting:
       - If raw replicate wells are available: resample wells within each condition with replacement.
       - If only mean \(\pm\) SEM are available: simulate pseudo-data as \(y^*(t)=\bar y(t)+\mathcal N(0,\text{SEM}(t))\).
     - Retain one best fit plus the 200 refits for uncertainty bands and downstream predictions.

6. **Goal 6: Predict phage dynamics and compute \(R\)**
   - **Equations**:
     - Observable phage concentration for extraction assays:
       \[
       P_{\text{all}}(t)=P(t)+B\,I_M(t)
       \]
     - Composite viral growth parameter:
       \[
       R=\frac{rB}{\exp(\tau g^*)}
       \]
     - Plane relation used to estimate \(g^*\):
       \[
       \tau = \alpha\left(\log_{10} r + \log_{10} B\right)+\beta
       \]
       then
       \[
       g^*=\frac{\ln 10}{\alpha}
       \]
     - Simplified delayed-growth interpretation:
       \[
       \frac{dP(t)}{dt}=R\,U(t)\,P(t-\tau)
       \]
   - **Parameters**:
     - \(g^*\): characteristic host growth rate inferred from the plane fit.
     - \(R\): derived for each accepted parameter set and, in LBM, evaluated as a function of \(\phi\).
   - **Implementation constraints**:
     - Fit the plane in \((\log_{10}r,\log_{10}B,\tau)\) space using least squares on the accepted parameter ensemble from minimal-media fits.
     - Compare coefficient of variation of \(R\) to the CVs of \(r\), \(B\), and \(\tau\).
     - Use the same best-fit/ensemble parameters from Goal 5; do not refit to phage-extraction data.
     - For `phage_extraction_230119/df_1e*.csv`, use `tdata` as time, `ydata` as measured phage signal, and `yerr` for uncertainty after confirming how suffixes map to initial conditions.

7. **Goal 7: Quantify lysogens and fit the single-cell lysogenization model**
   - **Equations**:
     - Exponential back-extrapolation:
       \[
       N(t)=N_0 e^{gt}
       \]
     - Lysogeny frequency:
       \[
       f_{\text{lysogeny}}=\frac{L_0}{T_0}
       \]
     - Poisson single-cell MOI distribution:
       \[
       P_n=\frac{(aM)^n e^{-aM}}{n!}
       \]
     - Single-cell lysogenization probabilities:
       \[
       Q_n=
       \begin{cases}
       0 & n=0\\
       q_1 & n=1\\
       q_2 & n=2\\
       \cdots\\
       q_{\text{MOI}^*} & n\ge \text{MOI}^*
       \end{cases}
       \]
     - Bulk lysogeny prediction:
       \[
       f_{\text{lysogeny}}=\sum_{n=0}^{\infty} P_n Q_n
       \]
     - For \(\text{MOI}^*=2\):
       \[
       f_{\text{lysogeny}}=P_1 q_1 + (1-P_0-P_1)q_2
       \]
     - High-MOI repression:
       \[
       R_n=
       \begin{cases}
       1 & 0\le n < \text{MOI}^*\\
       e^{-k(n-\text{MOI}^*)} & n\ge \text{MOI}^*
       \end{cases}
       \]
       and then
       \[
       f_{\text{lysogeny}}=\sum_{n=0}^{\infty} P_n Q_n R_n
       \]
     - Log-space fitting loss:
       \[
       \mathcal{L}_{\text{lys}}=\sum_M \left[\log f_{\text{lysogeny}}(M)-\log \hat f_{\text{lysogeny}}(M)\right]^2
       \]
   - **Parameters**:
     - \(a>0\): infection-efficiency / scaling factor applied to the measured average MOI.
     - \(q_1,q_2 \in [0,1]\), with \(q_1\le q_2\).
     - \(k\ge 0\): high-MOI repression rate.
     - \(\text{MOI}^*\in\{1,2,3\}\): scan discrete values.
   - **Thresholds**:
     - Fit the growth window only where \(0.02 \le OD \le 0.1\).
   - **Implementation constraints**:
     - Define \(t=0\) as the dilution into the detection plate.
     - For the fixed-growth assay, extrapolate selected growth curves back to the dilution time even though kanamycin is added after a short outgrowth.
     - Compute \(L_0\) from infected, selected wells and \(T_0\) from uninfected, unselected controls.
     - Truncate the infinite Poisson sum at \(n_{\max}=50\) or when the remaining tail mass is < \(10^{-8}\).
     - Use bootstrap over replicate wells and independent runs to obtain uncertainty on \(a,q_1,q_2,k\).

8. **Goal 8: Extend lysogeny inference across growth rates and build the fate surface**
   - **Equations**:
     - Preinfection growth-rate fit:
       \[
       N(t)=N_0 e^{gt}
       \]
       fitted on the 30-minute preinfection segment in log space.
     - Phenomenological parameterizations:
       \[
       \log a = \beta_2 g^2 + \beta_1 g + \beta_0
       \]
       \[
       \log q_1 = \beta_1 g + \beta_0
       \]
       \[
       \log q_2 =
       \begin{cases}
       \beta_1 g + \beta_0 & g<g^*\\
       \beta_2 g + (\beta_1-\beta_2)g^* + \beta_0 & g\ge g^*
       \end{cases}
       \]
       \[
       k=
       \begin{cases}
       0 & g<g_1\\
       -(g-g_1)(g-g_2) & g_1\le g<g_2\\
       0 & g\ge g_2
       \end{cases}
       \]
   - **Parameters**:
     - Growth rate \(g\) for this stage should be expressed in h\(^{-1}\); convert from min\(^{-1}\) if needed.
     - \(\beta\) coefficients, \(g^*, g_1, g_2\): fitted phenomenological parameters.
   - **Thresholds**:
     - Scan the fate surface over \(10^{-3}\le M \le 10^2\) and \(0\le g \le 1.25\) h\(^{-1}\).
   - **Implementation constraints**:
     - Fit each sampled growth state separately first using Goal 7, then fit the growth-rate trends.
     - If a stationary-state fit prefers \(\text{MOI}^*=1\), set \(q_2=q_1\) when creating a continuous surface.
