# -- SimulatedUser configuration --

[simulated_user]
research_brief = '''
# Research Brief: phagecounting

## Background
We will use microplate-reader OD trajectories of infected *E. coli* cultures to quantify phage abundance, fit mechanistic infection models, and infer rates of lysogenization and spontaneous induction under changing host physiology. The locally available inputs include raw TECAN exports (`TECAN_230114.csv`, `TECAN_230119_fig3.csv`, `TECAN_230212.csv`, `TECAN_230214.csv`, `TECAN_230328a.csv`, `TECAN_230328b.csv`, `TECAN_240128.csv`, `TECAN_240130.csv`, `TECAN_240201.csv`), summarized phage-extraction time courses (`phage_extraction_230119/df_1e0.csv` through `df_1e9.csv`), MOI-response `.mat` files (`d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat`, `...run2...mat`), and a headerless spontaneous-induction source-data file (`spontaneous_induction_phage.csv`). The computational question is how much information about phage number, lytic kinetics, and lysogenic fate can be recovered from OD dynamics alone when infection occurs continuously in the plate reader.


## Experimental Design
For the lambda_ts calibration and unknown-sample plate in `../data/TECAN_240128.csv`, I set up a dilution series in MG1655 in LBM (38 C) spanning no dilution through `1e7 dilu`, with replicate wells `A1-A2` (no dilu), `A3-A4` (`1e1 dilu`), `A5-A6` (`1e2 dilu`), `A7-A8` (`1e3 dilu`), `B1-B2` (`1e4 dilu`), `B3-B4` (`1e5 dilu`), `B5-B6` (`1e6 dilu`), and `B7-B8` (`1e7 dilu`). I included unknown sample groups `A` (`C1-C2`), `B` (`C3-C4`), and `C` (`C5-C6`), with `LBM blank` controls in `F7-F8` and `uninfected` controls in `C7-C8`.

For the single-phage assay in LBMM, using `../data/TECAN_230328a.csv` and `../data/TECAN_230328b.csv`, I assigned all wells `A1-D8` as `+Phage`, giving a continuous treatment block across 32 wells. I used `E3-E8` and `F1-F4` as `-Phage` controls, `E1-E2` as positive controls, and `F6-F8` as `LBMM blank` controls.

