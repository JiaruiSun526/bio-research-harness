# -- Data catalog: describes datasets for the main agent --

[[data.catalog]]
name = "Phage extraction dilution-series time-course summaries"
path = "data/phage_extraction_230119/df_1e0.csv"
description = '''Ten CSVs in data/phage_extraction_230119/ share the same 3-column schema: df_1e0.csv, df_1e1.csv, df_1e2.csv, df_1e3.csv, df_1e4.csv, df_1e5.csv, df_1e6.csv, df_1e7.csv, df_1e8.csv, and df_1e9.csv. Each row is one time-point observation, with tdata as the time coordinate, ydata as the summarized response, and yerr as the associated error bar; most files have 10 time points, while df_1e6.csv and df_1e8.csv have 8 and df_1e9.csv has 7. The filenames encode a 1e0–1e9 series, so use the specific file matching the dilution/condition label you need; the exact physical units of tdata and ydata are not stated in the sample.'''

[[data.catalog]]
name = "TECAN plate-reader time-course exports"
path = "data/TECAN_230114.csv"
description = '''Wide-format TECAN CSV exports from multiple dates: TECAN_230114.csv, TECAN_230119_fig3.csv, TECAN_230212.csv, TECAN_230214.csv, TECAN_230328a.csv, TECAN_230328b.csv, TECAN_240128.csv, TECAN_240130.csv, and TECAN_240201.csv. In these files, columns 1..N are sequential read times/cycles, the first row labeled Time [s] gives the time vector, the second row appears to be temperature, and the remaining ~48 rows are individual well/sample traces identified by labels in the first column. Use TECAN_230119_fig3.csv when a task explicitly references Fig. 3, use TECAN_230328a.csv versus TECAN_230328b.csv for the two separate runs on 2023-03-28, and otherwise pick the date-stamped file matching the experiment date before reshaping from wide to long format.'''

[[data.catalog]]
name = "Spontaneous induction phage coordinate pairs"
path = "data/spontaneous_induction_phage.csv"
description = '''This is a headerless 2-column numeric CSV with 8 paired observations, but if read with default pandas settings the first data row will be mistaken for column names. Rows are x-y coordinate pairs only; the sample does not identify units or axis meaning, so load it with header=None and assign your own column names. The filename indicates it is associated with spontaneous induction phage data.'''

[[data.catalog]]
name = "MATLAB MOI response-surface files"
path = "data/d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat"
description = '''Two binary MATLAB files are present: d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat and d20230216_ODbasedMOIresponsesurface_run2_24-Feb-2023.mat, each 2.8 KB. Their filenames indicate two runs of an OD-based MOI response-surface dataset, but the internal variables and schema are not visible from the inventory. Inspect them with scipy.io.loadmat() to list variables and determine which run contains the data you need.'''

[[data.catalog]]
name = "OD-based MOI response detection-plate workbook"
path = "data/20220901_ODbasedMOIresponse_optimalphysio_detectionplate.xlsx"
description = '''Binary Excel workbook named 20220901_ODbasedMOIresponse_optimalphysio_detectionplate.xlsx (105.4 KB). The filename indicates an OD-based MOI response experiment on 2022-09-01 for an optimalphysio detection plate, but sheet structure and table layout are not visible here. Inspect with pd.ExcelFile() to list sheet names, then read relevant sheets with pd.read_excel().'''

[[data.catalog]]
name = "OD-based MOI response infection-plate workbook"
path = "data/20220901_ODbasedMOIresponse_optimalphysio_infectionplate.xlsx"
description = '''Binary Excel workbook named 20220901_ODbasedMOIresponse_optimalphysio_infectionplate.xlsx (17.4 KB). The filename indicates an OD-based MOI response experiment on 2022-09-01 for an optimalphysio infection plate, but the workbook's sheets and schema are not visible from the inventory. Inspect with pd.ExcelFile() to list sheet names, then load individual sheets with pd.read_excel().'''

[[data.catalog]]
