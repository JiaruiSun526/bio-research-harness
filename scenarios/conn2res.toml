# -- Data catalog: describes datasets for the main agent --

[[data.catalog]]
name = "Drosophila connectivity matrix"
path = "data/drosophila/conn.csv"
description = '''Headerless numeric matrix that was previewed with the first data row misread as column names; reload with header=None to recover the full 49×49 table. Rows and columns appear to be the same ordered set of 49 drosophila brain regions/nodes, aligned by count with data/drosophila/labels.csv and data/drosophila/labels_description.csv. Use it as the weighted connectivity/edge-strength matrix for the fly network.'''

[[data.catalog]]
name = "Drosophila 3D node coordinates"
path = "data/drosophila/coords.csv"
description = '''Headerless 3-column numeric table; reload with header=None to recover all 49 rows. Rows appear to match the 49 nodes used in data/drosophila/conn.csv, and the three columns are spatial coordinates in a 3D embedding or atlas (axis names are not given). Use for spatial plotting or geometry-aware analyses.'''

[[data.catalog]]
name = "Drosophila sensory labels"
path = "data/drosophila/labels.csv"
description = '''Two-column annotation table mapping neuron/region abbreviations to a binary Sensory flag. Rows are named nodes and columns are attributes: Neuron = region code, Sensory = 0/1 label. Use this file to classify nodes as sensory vs non-sensory and to attach names to the order used in the drosophila matrices.'''

[[data.catalog]]
name = "Drosophila region descriptions"
path = "data/drosophila/labels_description.csv"
description = '''Lookup table from neuron/region abbreviations to coarse functional descriptions such as olf, aud, prem, rvis, and lvis. Rows are nodes and columns are text metadata; unlike data/drosophila/networks.csv, this file preserves the node identifiers. Use it when you need interpretable categorical annotations for the fly nodes.'''

[[data.catalog]]
name = "Drosophila network-category vector"
path = "data/drosophila/networks.csv"
description = '''Single-column categorical vector stored without an explicit header row; reload with header=None if you need the full 49 entries, because the first value ('olf') was interpreted as the column name. Values are coarse network labels such as aud, olf, prem, rvis, and lvis, but the file contains no neuron IDs. Use it only when node order is already known from the companion drosophila matrices.'''

[[data.catalog]]
name = "Drosophila dataset reference"
path = "data/drosophila/ref.txt"
description = '''Plain-text citation for the drosophila connectome dataset source. Use it for provenance, bibliography, or to locate methodological details in the original paper.'''

[[data.catalog]]
name = "Human NumPy connectivity arrays"
path = "data/human/*.npy"
description = '''Eleven NumPy binary files in the human folder; sample filenames shown in the inventory are connectivity.npy, consensus_0.npy, and consensus_1.npy. Because these are binary files, inspect them with numpy.load() and a directory listing to confirm exact filenames, shapes, and dtypes before analysis. Use the companion data/human/README.txt.txt to determine which array corresponds to subject-level vs consensus data.'''

[[data.catalog]]
name = "Human dataset README"
path = "data/human/README.txt.txt"
description = '''Short text note explaining the intended meaning of the human .npy files. It states that connectivity.npy contains a 3D array of structural connectivity matrices for 70 subjects, consensus_0.npy is a group-level matrix, and consensus_X files are bootstrapped group-level matrices. Read this before choosing a specific .npy file.'''

[[data.catalog]]
name = "Macaque binary connectivity matrix"
path = "data/macaque_modha/conn.csv"
description = '''Headerless integer matrix with 0/1 values; reload with header=None to recover the full square table instead of treating the first row as column names. Rows and columns appear to be the same ordered list of macaque regions, matching data/macaque_modha/coords.csv and data/macaque_modha/dist.csv. Use it as the structural adjacency matrix, but note that data/macaque_modha/labels.csv has one fewer row than the matrix/description files, so verify alignment before merging annotations.'''

[[data.catalog]]
name = "Macaque region coordinates"
path = "data/macaque_modha/coords.csv"
description = '''Headerless 3-column numeric table of region coordinates; reload with header=None to recover all rows. Rows appear to align with the macaque connectivity and distance matrices, and the three columns are likely x/y/z positions, although axis names are not provided. Many rows are 0,0,0, so treat those as possible missing or placeholder coordinates.'''

[[data.catalog]]
name = "Macaque inter-region distance matrix"
path = "data/macaque_modha/dist.csv"
description = '''Headerless square numeric matrix with zeros on the diagonal and symmetric-looking positive values off-diagonal, consistent with pairwise distances between regions. Reload with header=None to recover the full table; row and column order appears to match data/macaque_modha/conn.csv and data/macaque_modha/coords.csv. Use this for spatial cost or distance-dependent analyses.'''

[[data.catalog]]
name = "Macaque sensory labels"
path = "data/macaque_modha/labels.csv"
description = '''Two-column table mapping macaque region abbreviations to a binary Sensory label. Rows are regions and columns are attributes: Region = code, Sensory = 0/1. This file has 241 rows, so confirm which matrix node is unmatched before joining it to the 242-node numeric tables suggested by the other files.'''

[[data.catalog]]
name = "Macaque region descriptions"
