# -- Data catalog: describes datasets for the main agent --

[[data.catalog]]
name = "Phage extraction time-series summaries (2023-01-19 condition series)"
path = "data/phage_extraction_230119/df_1e0.csv"
description = '''Derived time-series summary tables from the phage_extraction_230119 experiment. This group includes df_1e0.csv, df_1e1.csv, df_1e2.csv, df_1e3.csv, df_1e4.csv, df_1e5.csv, df_1e6.csv, df_1e7.csv, df_1e8.csv, and df_1e9.csv; the filenames encode a 1e0 through 1e9 condition series that should be used to pick the matching experimental condition. In each file, rows are sampled time points and columns are tdata (elapsed time; units not stated in the file), ydata (response value), and yerr (associated uncertainty/error bar). Use these files for plotting or fitting extracted curves for a specific 1eN condition; note that df_1e6.csv, df_1e8.csv, and df_1e9.csv contain fewer time points than the others.'''

[[data.catalog]]
name = "TECAN kinetic plate-reader CSV exports"
path = "data/TECAN_230114.csv"
description = '''Raw Tecan i-control kinetic exports in CSV form for TECAN_230114.csv, TECAN_230119_fig3.csv, TECAN_230212.csv, TECAN_230214.csv, TECAN_230328a.csv, TECAN_230328b.csv, TECAN_240128.csv, TECAN_240130.csv, and TECAN_240201.csv. The layout is wide and transposed relative to tidy time-series data: columns 1..N are sequential acquisition cycles/time points, while rows are labeled by the first column and include at least Time [s] and temperature plus many later measurement traces. The later row labels likely identify wells or measurement channels, but that mapping is not visible in the sample and should be checked in the first column before analysis. Use the date/suffix in the filename to choose the correct run, for example 230328a versus 230328b for two same-day runs and 230119_fig3 for the 2023-01-19 Figure 3 dataset.'''

[[data.catalog]]
name = "Spontaneous induction phage x-y points"
path = "data/spontaneous_induction_phage.csv"
description = '''Small two-column numeric dataset of x-y pairs with no explicit header row. The preview treated the first data pair as column names, so this file should be read with header=None to recover all observations. Rows are individual points and both columns are continuous numeric values, but variable names and units are not provided in the file. Use it as a compact plotted or digitized dataset for spontaneous induction phage analysis after assigning axis meaning from project context.'''

[[data.catalog]]
name = "OD-based MOI response-surface MATLAB files"
path = "data/d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat"
description = '''MATLAB binary files for d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat and d20230216_ODbasedMOIresponsesurface_run2_24-Feb-2023.mat. Only the filenames and sizes are visible here; they appear to be two runs of an OD-based MOI response-surface dataset dated 2023-02-16. Inspect with scipy.io.loadmat() to list variables, or use h5py if the files are in MATLAB v7.3 format, before deciding which arrays to analyze.'''

[[data.catalog]]
name = "Optimal physiology detection-plate workbook (2022-09-01)"
path = "data/20220901_ODbasedMOIresponse_optimalphysio_detectionplate.xlsx"
description = '''Excel workbook for the 2022-09-01 OD-based MOI response optimal-physiology detection plate. Sheet2 is the only populated sheet and contains a 90 x 200 mixed-format Tecan export with instrument metadata text and a wide numeric measurement block; sample values indicate time-like entries such as 373.2 and 746.5 alongside temperature/reading values. Use pd.ExcelFile() or pd.read_excel() on Sheet2 and inspect row positions/skiprows to isolate the actual measurement matrix, because the workbook is not stored as a clean rectangular data table. Sheet1 is empty.'''

[[data.catalog]]
name = "Optimal physiology infection-plate workbook (2022-09-01)"
path = "data/20220901_ODbasedMOIresponse_optimalphysio_infectionplate.xlsx"
description = '''Excel workbook for the 2022-09-01 OD-based MOI response optimal-physiology infection plate. Sheet2 is the only populated sheet and has the same mixed Tecan-export structure as the detection-plate file, but much narrower at 90 x 10, with instrument metadata and a small numeric block in the same sheet. Use sheet-specific import and inspect rows manually to determine where the measurement block begins; do not assume standard column headers or tidy row semantics. Sheet1 is empty.'''

[[data.catalog]]
name = "OD-based MOI response LBM run2 workbook (2022-10-22)"
path = "data/20221022_ODbasedMOIresponse_LBM_run2.xlsx"
description = '''Excel workbook for the 2022-10-22 OD-based MOI response LBM run2 experiment. Two sheets are populated: Sheet3 (90 x 232) and Sheet2 (90 x 10), both using a Tecan-export layout that mixes instrument metadata text with wide numeric sequences, while Sheet1 is empty. Sample values show time-like numeric series embedded in the sheets, so rows rather than columns define the record type and the true measurement block must be isolated with custom row skipping or manual inspection. Use this workbook when you specifically need the 2022-10-22 LBM run2 raw export, and choose Sheet3 or Sheet2 based on which sub-export matches the analysis.'''

