[[data.catalog]]
name = "Processed phage extraction time-series summaries"
path = "data/phage_extraction_230119/df_1e0.csv"
description = '''Processed phage-extraction summary curves from phage_extraction_230119/df_1e0.csv, df_1e1.csv, df_1e2.csv, df_1e3.csv, df_1e4.csv, df_1e5.csv, df_1e6.csv, df_1e7.csv, df_1e8.csv, and df_1e9.csv; the 1eX suffix distinguishes ten conditions within the 2023-01-19 set. Each row is one sampled time point, with tdata as the numeric time coordinate, ydata as the extracted response value, and yerr as the pointwise uncertainty/error. Most files contain 10 time points, while df_1e6.csv and df_1e8.csv have 8 rows and df_1e9.csv has 7. Use these files for plotting or fitting one summarized trajectory per 1eX condition rather than re-parsing raw instrument exports.'''

[[data.catalog]]
name = "TECAN plate-reader raw CSV exports"
path = "data/TECAN_230114.csv"
description = '''Raw Tecan plate-reader CSV exports: TECAN_230114.csv, TECAN_230119_fig3.csv, TECAN_230212.csv, TECAN_230214.csv, TECAN_230328a.csv, TECAN_230328b.csv, TECAN_240128.csv, TECAN_240130.csv, and TECAN_240201.csv; filenames encode experiment date, with 230328a/230328b as same-day paired runs and 230119_fig3 as a figure-specific export. These are wide-format instrument dumps where columns '1'..'N' are sequential read cycles/time points and the first column contains row labels; the sample shows a 'Time [s]' row, a likely temperature row, and then many measurement rows. The row labels for individual wells/channels are not visible in the sample, so inspect the first column after loading to map traces to wells. Use these files when you need raw kinetic plate data instead of processed summaries.'''

[[data.catalog]]
name = "Spontaneous induction phage coordinate pairs"
path = "data/spontaneous_induction_phage.csv"
description = '''Sparse two-column numeric dataset named spontaneous_induction_phage.csv. The file appears to have no header row, so if loaded with default pandas settings the first numeric pair becomes the column names; use header=None to recover all 8 rows of (x, y) observations. Rows are observations and columns are the two numeric coordinates, with the first increasing from about 0.06 to 2.02 and the second decreasing from about 6.75 to 2.04. Use it as a digitized curve or other small summary series associated with spontaneous phage induction.'''

[[data.catalog]]
name = "OD-based MOI response-surface MATLAB runs"
path = "data/d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat"
description = '''MATLAB binary outputs d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat and d20230216_ODbasedMOIresponsesurface_run2_24-Feb-2023.mat. Filenames indicate two runs of an OD-based MOI response-surface analysis for 2023-02-16, but variable names and array shapes are not visible from the sample. Load with scipy.io.loadmat() to list variables; if that fails because the files are MATLAB v7.3/HDF5, inspect them with h5py.File(). Use run1 versus run2 according to the suffix in the filename.'''

[[data.catalog]]
name = "Optimal physiology detection plate workbook"
path = "data/20220901_ODbasedMOIresponse_optimalphysio_detectionplate.xlsx"
description = '''Excel workbook 20220901_ODbasedMOIresponse_optimalphysio_detectionplate.xlsx, apparently a Tecan i-control export for the 'optimalphysio' detection plate on 2022-09-01. Sheet2 is the only non-empty sheet (90×200); it mixes instrument metadata text with a wide numeric table, so read with header=None or inspect raw rows before assigning headers. The sample values show embedded time-point fields (for example 373.2 and 746.5) together with temperature/measurement-like values, consistent with a kinetic plate export. Use this file when you need the raw detection-plate workbook rather than the smaller infection-plate companion file.'''

[[data.catalog]]
name = "Optimal physiology infection plate workbook"
