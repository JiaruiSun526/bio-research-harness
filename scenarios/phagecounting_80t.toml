# -- Data catalog: describes datasets for the main agent --

[[data.catalog]]
name = "TECAN kinetic plate-reader CSV exports"
path = "data/TECAN_230114.csv"
description = '''Wide-format TECAN CSV exports for multiple runs: data/TECAN_230114.csv, data/TECAN_230119_fig3.csv, data/TECAN_230212.csv, data/TECAN_230214.csv, data/TECAN_230328a.csv, data/TECAN_230328b.csv, data/TECAN_240128.csv, data/TECAN_240130.csv, and data/TECAN_240201.csv. The first column is a row label/series identifier rather than a sample ID; the sample shows rows such as "Time [s]" and a temperature row (~30–38), followed by many rows of numeric signal traces, while columns "1"..."N" are sequential measurement cycles/timepoints. Use the date/run suffix to pick the requested experiment, use the "Time [s]" row to recover elapsed time for each column, and inspect the first-column labels to identify the well/sample rows; notable differences visible in the sample are that TECAN_230328b.csv has a much higher baseline signal (~0.45–0.52) than the others (~0.09) and TECAN_230212.csv shows a lower temperature row (~30) than most runs (~38).'''

[[data.catalog]]
name = "MATLAB OD-based MOI response-surface runs"
path = "data/d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat"
description = '''Binary MATLAB files for two runs: data/d20230216_ODbasedMOIresponsesurface_run1_24-Feb-2023.mat and data/d20230216_ODbasedMOIresponsesurface_run2_24-Feb-2023.mat. From the filenames, these correspond to a 2023-02-16 OD-based MOI response-surface analysis, with separate run1 and run2 files, but the internal variables and schema are not visible from the inventory. Load with scipy.io.loadmat() to list variables, or use h5py if the files are MATLAB v7.3, and choose run1 vs run2 according to the requested replicate.'''

[[data.catalog]]
