description = '''Binary Excel workbook named 20221022_ODbasedMOIresponse_LBM_run2.xlsx (129.7 KB). The filename indicates an OD-based MOI response experiment labeled LBM run2 on 2022-10-22, but its sheets and table structure are not visible here. Inspect with pd.ExcelFile() to list sheet names before choosing sheets to load with pd.read_excel().'''

