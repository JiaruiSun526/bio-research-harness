9. **Goal 9: Model spontaneous induction**
   - **Equations**:
     - Growth-rate-dependent induction rate:
       \[
       k_i(\phi)=\max(0, k_{ik}\phi + k_{ib})
       \]
     - Lysogen/induction dynamics:
       \[
       \frac{dN}{dt}= -e\left(L+\sum_{i=1}^{M}I_i\right)g(N)
       \]
       \[
       \frac{dL}{dt}=Lg(N)-k_iL
       \]
       \[
       \frac{dI_1}{dt}=k_iL-\frac{M}{\tau}I_1
       \]
       \[
       \frac{dI_i}{dt}=\frac{M}{\tau}(I_{i-1}-I_i),\quad i=2,\dots,M
       \]
       \[
       \frac{dP}{dt}=B\frac{M}{\tau}I_M-0.1\,r\left(L+\sum_{i=1}^{M}I_i\right)P
       \]
     - Joint OD-plus-phage loss:
       \[
       \mathcal{L}_{\text{ind}}=
       \frac{1}{|T_O|}\sum_{t\in T_O}
       \left[
       \frac{\left(\hat L(t)+\sum_{i=1}^{M}\hat I_i(t)\right)\varepsilon(\hat N(t))-OD(t)}
       {\max OD - \min OD}
       \right]^2
       +
       \frac{1}{|T_P|}\sum_{t\in T_P}
       \left[
       \frac{\log\left(\hat P(t)+B\hat I_M(t)\right)-\log P(t)}
       {\max \log P - \min \log P}
       \right]^2
       \]
   - **Parameters**:
     - \(M=5\), fixed.
     - \(k_{ik}\): slope of induction-rate dependence, search in \([0,10^{-4}]\) min\(^{-1}\).
     - \(k_{ib}\): intercept, search in \([-10^{-4},10^{-4}]\) min\(^{-1}\), with clipping at 0 through the `max` operator.
     - \(r,B,\tau\): import from the corresponding infection-model fit.
   - **Thresholds**:
     - Adsorption term is scaled by 0.1 relative to maltose-like adsorption because glucose lowers adsorption approximately tenfold.
   - **Implementation constraints**:
     - Parameterize host growth in LBGM exactly as in Goal 4 with \(X=3\).
     - Use the adsorption-capable \(r\)-model as the main fit; run a no-adsorption sensitivity analysis if time permits.
     - If the phage-measurement file lacks explicit sample times, map the eight extracted-phage measurements to the times when the OD trajectory crosses the target blank-subtracted OD values used for sampling: inoculation, 0.01, 0.02, 0.04, 0.25, 0.30, 0.50, and 1.00.
